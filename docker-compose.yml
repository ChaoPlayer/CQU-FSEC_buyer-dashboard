version: '3.8'

services:
  procurement-web:
    image: procurement-web:v4.1
    container_name: procurement-web
    ports:
      - "3000:3000"
    restart: always
    volumes:
      # 持久化数据库文件（SQLite）及 Prisma 配置
      - ./prisma:/app/prisma
      # 挂载考勤数据 CSV 文件（宿主机 NAS 路径 → 容器内 /app/data）
      - /volume1/CQU_data:/app/data
      # 持久化上传文件（进度树附件、工时申请附件等），防止容器重建后丢失
      - ./uploads:/app/public/uploads
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db

  prisma-studio:
    image: procurement-web:v4.1
    container_name: prisma-studio
    ports:
      - "5555:5555"
    restart: always
    volumes:
      - ./prisma:/app/prisma
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0      # 加上这行环境变量，让它允许局域网外部访问
      - DATABASE_URL=file:/app/prisma/dev.db
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - PRISMA_TELEMETRY_OPT_OUT=1

      - PRISMA_QUERY_ENGINE_LIBRARY=/app/node_modules/@prisma/engines/libquery_engine-linux-musl-openssl-3.0.x.so.node
      - PRISMA_SCHEMA_ENGINE_BINARY=/app/node_modules/@prisma/engines/schema-engine-linux-musl-openssl-3.0.x
    command: npx prisma studio --port 5555 --browser none
